[config]
model = "openrouter/anthropic/claude-sonnet-4"
fallback_models = ["openrouter/mistralai/devstral-2512"]
custom_model_max_tokens = 100000

[pr_reviewer]
num_max_findings = 20
require_todo_scan = true
require_can_be_split_review = true

[pr_code_suggestions]
num_code_suggestions_per_chunk = 6
max_number_of_calls = 6
parallel_calls = true
suggestions_score_threshold = 0
focus_only_on_problems = false

[pr_reviewer_agent]
  agent_mode = true
  agent_max_passes = 2 
  agent_max_total_findings = 10
  agent_max_skill_calls = 3
  agent_max_findings_per_skill = 10
  agent_min_risk_to_trigger = 1
  agent_review_skills = [                                                                                                                                               
      "frontend-ui-engineering",
      "code-review-and-quality",                                                                                                                                        
      "security-and-hardening", 
      "performance-optimization",                                                                                                                                       
      "test-driven-development", 
  ] 
